name: Deploy Production

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - 'release'

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-push:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-24.04-arm

    outputs:
      version: ${{ steps.version.outputs.version }}
      image-tag: ${{ steps.version.outputs.image-tag }}

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: calculate next frontend release version
        id: version
        env:
          PREFIX: frontend
        run: |
          git fetch --tags origin
          TARGET_SHA="${{ github.event.pull_request.merge_commit_sha || github.sha }}"
          VERSION="$(python3 - "$PREFIX" "$TARGET_SHA" <<'PY'
          import re, subprocess, sys
          prefix, target_sha = sys.argv[1:3]
          pattern = re.compile(rf"^{re.escape(prefix)}/v(\d+)\.(\d+)\.(\d+)$")
          versions = []
          for tag in subprocess.check_output(["git", "tag", "--list", f"{prefix}/v*"], text=True).splitlines():
              tag = tag.strip()
              match = pattern.match(tag)
              if not match:
                  continue
              version = tuple(map(int, match.groups()))
              commit = subprocess.check_output(["git", "rev-list", "-n", "1", tag], text=True).strip()
              if target_sha and commit == target_sha:
                  print(".".join(map(str, version)))
                  sys.exit(0)
              versions.append(version)
          major, minor, patch = max(versions) if versions else (0, 0, 0)
          print(f"{major}.{minor}.{patch + 1}")
          PY
          )"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image-tag=${PREFIX}_${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: build and push docker image
        uses: ./.github/actions/docker-build-push
        with:
          registry-url: ${{ secrets.REGISTRY_ADDRESS }}
          registry-username: ${{ secrets.REGISTRY_USERNAME }}
          registry-password: ${{ secrets.REGISTRY_PASSWORD }}
          image-name: bottlenote-frontend
          image-tag: ${{ steps.version.outputs.image-tag }}
          additional-tags: frontend_latest
          cache-scope: frontend-production
          sops-age-key: ${{ secrets.SOPS_AGE_SECRET_KEY }}
          env-file: git.environment-variables/application.next-js/prod.sops.env
          sign-image: 'true'
          cosign-key-path: git.environment-variables/storage/docker-registry/cosign.key
          cosign-password: ${{ secrets.COSIGN_PASSWORD }}

  update-production:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: update kustomize image tag
        env:
          REGISTRY: ${{ secrets.REGISTRY_ADDRESS }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          cd git.environment-variables
          git checkout main

          cd deploy/overlays/production
          kustomize edit set image \
            bottlenote-frontend=${REGISTRY}/bottlenote-frontend:${IMAGE_TAG}

      - name: commit and push
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          cd git.environment-variables
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add deploy/overlays/production/kustomization.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(prod): update frontend production image tag (${VERSION})

          Frontend: ${IMAGE_TAG}

          Updated by GitHub Actions
          Commit: ${{ github.sha }}
          Workflow: ${{ github.workflow }}"

          for i in {1..5}; do
            git pull --rebase origin main && git push origin main && break
            echo "Push failed, retry $i/5..."
            sleep $((i * 2))
          done

  create-release-tag:
    needs: [build-and-push, update-production]
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: checkout release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: create frontend release tag
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          TAG="frontend/v${VERSION}"
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Release tag already exists: ${TAG}"
            exit 0
          fi
          git tag -a "${TAG}" "${MERGE_SHA}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"
          echo "Created release tag: ${TAG} -> ${MERGE_SHA}"


